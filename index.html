<!DOCTYPE html>
<html lang="vi">
<head>

<title>TOEIC Campus Sprint — Luyện phản xạ ngữ pháp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

  :root{
    --ink:#1f2a44; --ink-soft:#52627d; --paper:#fff8ee; --card:#ffffff; --line:#eadfce;

  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%;overflow-x:hidden}
  body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;display:flex;justify-content:center;
    background:
      radial-gradient(circle at 12% 8%, rgba(255,138,61,.20), transparent 28%),
      radial-gradient(circle at 85% 12%, rgba(37,99,235,.14), transparent 32%),
      linear-gradient(135deg,#fff8ee 0%,#f7fbff 54%,#fff2e8 100%)}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(31,42,68,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(31,42,68,.035) 1px,transparent 1px);background-size:34px 34px;mask-image:linear-gradient(to bottom,black,transparent 85%)}
  .app{width:100%;max-width:820px;min-height:100vh;display:flex;flex-direction:column;padding:0 18px 40px;position:relative}
  .bar{position:sticky;top:0;z-index:20;background:rgba(255,248,238,.82);backdrop-filter:blur(14px);border:1px solid rgba(234,223,206,.7);border-top:none;border-radius:0 0 22px 22px;padding:13px 14px;display:flex;align-items:center;gap:10px;margin-bottom:24px;box-shadow:0 14px 35px -30px rgba(31,42,68,.4)}
  .logo{font-family:'Space Grotesk';font-weight:800;letter-spacing:-.04em;font-size:18px}.logo small{color:var(--cue);font-weight:700}.phase{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--ink);border-radius:999px;padding:5px 10px}.spacer{flex:1}
  .stat{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-soft);display:flex;gap:5px;align-items:baseline;background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px 9px}.stat b{font-size:15px;color:var(--cue);font-weight:700}.infobtn{border:1px solid var(--line);background:var(--card);border-radius:12px;width:32px;height:32px;cursor:pointer;font-weight:800;color:var(--ink);font-family:'Space Grotesk'}
  .scene{flex:1;display:flex;flex-direction:column;animation:rise .45s cubic-bezier(.2,.7,.2,1)}@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .eyebrow{font-family:'IBM Plex Mono';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--cue);font-weight:800;margin-bottom:14px}h1{font-family:'Space Grotesk';font-weight:800;font-size:clamp(34px,7vw,58px);line-height:.98;letter-spacing:-.055em;margin-bottom:16px}h1 .am{color:var(--blue)}.lede{font-size:17px;color:var(--ink-soft);max-width:58ch;margin-bottom:26px}.lede b{color:var(--ink)}
  .boss{display:flex;align-items:center;gap:15px;background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:22px;padding:16px 18px;box-shadow:var(--shadow);margin-bottom:20px}.avatar{width:58px;height:58px;flex:none;border-radius:18px;background:linear-gradient(135deg,var(--blue),var(--cue));position:relative;overflow:hidden;transition:background .4s}.avatar svg{position:absolute;inset:0}.bubble{flex:1}.bubble .who{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--slate);margin-bottom:2px;display:flex;align-items:center;gap:8px}.bubble .say{font-size:15.5px;color:var(--ink);min-height:22px}.waiting{display:inline-flex;gap:3px;align-items:center}.waiting i{width:5px;height:5px;border-radius:50%;background:var(--cue);animation:wpulse 1.2s infinite}.waiting i:nth-child(2){animation-delay:.2s}.waiting i:nth-child(3){animation-delay:.4s}@keyframes wpulse{0%,100%{opacity:.25}50%{opacity:1}}
  .qcard{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:24px;padding:24px;box-shadow:var(--shadow)}.qctx{font-family:'IBM Plex Mono';font-size:12px;color:var(--blue);margin-bottom:14px;letter-spacing:.02em;text-transform:uppercase}.stem{font-size:21px;font-weight:650;letter-spacing:-.015em;margin-bottom:22px;line-height:1.5}.blank{display:inline-block;min-width:88px;border-bottom:3px solid var(--cue);text-align:center;color:var(--cue);font-weight:800}.filled{display:inline-block;min-width:62px;border-bottom:3px solid var(--stop);text-align:center;color:var(--stop);font-weight:800;text-decoration:line-through;margin:0 4px}.correct-fill{display:inline-block;min-width:62px;border-bottom:3px solid var(--go);text-align:center;color:var(--go);font-weight:900;margin:0 4px;background:var(--go-wash);border-radius:8px 8px 0 0;padding:0 4px}.opts{display:grid;gap:11px}.opt{display:flex;align-items:center;gap:12px;border:1.5px solid var(--line);background:#fffaf4;border-radius:16px;padding:14px 15px;cursor:pointer;font-size:16px;text-align:left;transition:.15s;font-family:inherit;color:var(--ink);width:100%;box-shadow:0 2px 0 rgba(31,42,68,.03)}.opt:hover:not(:disabled){border-color:var(--cue);transform:translateX(3px)}.opt:disabled{cursor:default}.opt .key{font-family:'IBM Plex Mono';font-size:13px;color:var(--ink-soft);border:1px solid var(--line);border-radius:10px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;flex:none;background:white}.opt.correct{border-color:var(--go);background:var(--go-wash)}.opt.correct .key{border-color:var(--go);color:var(--go)}.opt.wrong{border-color:var(--stop);background:var(--stop-wash)}.opt.wrong .key{border-color:var(--stop);color:var(--stop)}.shake{animation:shake .4s}@keyframes shake{0%,100%{transform:none}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
  .gate{margin-top:12px;border:1.5px solid var(--stop);background:linear-gradient(135deg,var(--stop-wash),#fff);border-radius:20px;padding:14px;animation:rise .4s;box-shadow:var(--shadow)}.rule-preview{margin:12px 0 12px;padding:14px 15px;border-radius:16px;background:linear-gradient(135deg,var(--blue-wash),#fff);border:1.5px solid rgba(37,99,235,.35);box-shadow:0 10px 25px -22px var(--blue)}.rule-preview.hide{display:none}.rule-preview-kicker{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);font-weight:800;margin-bottom:5px}.rule-preview-text{font-size:15px;line-height:1.55;color:var(--ink);font-weight:650}.gate.solved{border-color:var(--go);background:linear-gradient(135deg,var(--go-wash),#fff)}.gate h3{font-family:'Space Grotesk';font-size:18px;letter-spacing:-.02em;margin-bottom:6px;display:flex;align-items:center;gap:8px}.lock-tag{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:var(--stop);border-radius:999px;padding:3px 8px}.lock-tag.go{background:var(--go)}.prompt{font-size:15px;color:var(--ink-soft);margin-bottom:4px}.badsent{font-size:17px;font-weight:650;margin:10px 0 4px;line-height:1.5}.reveal{margin-top:16px;padding-top:16px;border-top:1px dashed rgba(23,168,120,.5);animation:rise .4s}.reveal .lab{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--go);margin-bottom:8px}.rule{font-size:16px;line-height:1.6}.hl{background:var(--cue);color:#fff;border-radius:8px;padding:2px 8px;font-weight:800;font-family:'IBM Plex Mono';font-size:14px}.nudge{margin-top:14px;font-size:14px;color:var(--ink-soft);background:var(--cue-wash);border:1px dashed var(--cue);border-radius:14px;padding:12px 14px;animation:rise .35s}.nudge b{color:var(--ink)}
.cue-card{margin:12px 0 8px;padding:14px 16px;border-radius:16px;background:linear-gradient(135deg,var(--blue-wash),#fff);border:1.5px solid rgba(37,99,235,.4);box-shadow:0 10px 25px -22px var(--blue);animation:rise .35s}.cue-kicker{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);font-weight:800;margin-bottom:6px}.cue-text{font-size:16px;line-height:1.55;color:var(--ink);font-weight:650}
  .micwrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:10px}.orb{width:68px;height:68px;border-radius:24px;border:none;cursor:pointer;position:relative;background:linear-gradient(135deg,var(--blue),var(--ink));color:#fff;display:flex;align-items:center;justify-content:center;transition:.25s;box-shadow:0 18px 30px -22px var(--blue)}.orb:hover{transform:scale(1.04) rotate(-1deg)}.orb svg{width:28px;height:28px}.orb.live{background:linear-gradient(135deg,var(--stop),var(--pink))}.orb.live::before,.orb.live::after{content:'';position:absolute;inset:0;border-radius:32px;border:2px solid var(--stop);animation:ping 1.6s ease-out infinite}.orb.live::after{animation-delay:.8s}@keyframes ping{from{transform:scale(1);opacity:.7}to{transform:scale(1.55);opacity:0}}.orb.ok{background:var(--go)}.orb.processing{background:var(--cue);cursor:wait}.orb.processing::before{content:'';position:absolute;inset:0;border-radius:32px;border:2px solid var(--cue);animation:ping 1s ease-out infinite}.miclabel{font-size:14px;color:var(--ink-soft);text-align:center;min-height:0}.miclabel:empty{display:none}.transcript{display:none}.transcript.empty{display:none}.verdict{font-family:'IBM Plex Mono';font-size:13px;letter-spacing:.04em;min-height:18px;text-align:center}.verdict.good{color:var(--go)}.verdict.bad{color:var(--stop)}
  .btnrow{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap}.btn{font-family:'Space Grotesk';font-weight:800;font-size:15px;border:none;border-radius:16px;padding:14px 22px;cursor:pointer;transition:.18s;letter-spacing:-.01em}.btn.primary{background:linear-gradient(135deg,var(--blue),var(--ink));color:#fff}.btn.primary:hover{transform:translateY(-2px);box-shadow:0 16px 25px -18px var(--blue)}.btn.primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}.btn.ghost{background:#fff;color:var(--ink-soft);border:1.5px solid var(--line)}.btn.ghost:hover{border-color:var(--cue);color:var(--ink)}.btn.amber{background:var(--cue);color:#fff}.btn.amber:hover{transform:translateY(-1px)}.tiny{font-size:12.5px;color:var(--slate);margin-top:10px;font-family:'IBM Plex Mono'}.center{text-align:center}
  .groups{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:8px}@media(max-width:560px){.groups{grid-template-columns:1fr}}.gcard{border:2px solid var(--line);border-radius:22px;padding:20px;cursor:pointer;background:rgba(255,255,255,.92);transition:.18s;box-shadow:var(--shadow)}.gcard:hover{border-color:var(--cue);transform:translateY(-2px)}.gcard.sel{border-color:var(--cue);background:var(--cue-wash)}.gcard .gt{font-family:'Space Grotesk';font-weight:800;font-size:18px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}.gcard .pill{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--blue);border-radius:999px;padding:3px 8px}.gcard .gd{font-size:14px;color:var(--ink-soft)}
  .dots{display:flex;gap:6px;margin-bottom:20px}.dot{height:6px;flex:1;border-radius:999px;background:var(--line);transition:.3s}.dot.done{background:var(--cue)}.dot.now{background:var(--blue)}.scoregrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:6px 0 24px}@media(max-width:560px){.scoregrid{grid-template-columns:1fr}}.scell{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px;text-align:center;box-shadow:var(--shadow)}.scell .n{font-family:'Space Grotesk';font-weight:800;font-size:36px;letter-spacing:-.03em;color:var(--blue)}.scell .l{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--slate);margin-top:4px}.scell.delayed{border-style:dashed;border-color:var(--cue);background:var(--cue-wash)}.scell.delayed .n{color:var(--cue)}.paas{background:#fff;border:1px solid var(--line);border-radius:20px;padding:20px;margin-bottom:18px;box-shadow:var(--shadow)}.paas .pq{font-size:15.5px;margin-bottom:12px;font-weight:650}.scale{display:flex;gap:5px}.sb{flex:1;aspect-ratio:1;border:1.5px solid var(--line);background:#fffaf4;border-radius:10px;cursor:pointer;font-family:'IBM Plex Mono';font-size:13px;color:var(--ink-soft);transition:.12s}.sb:hover{border-color:var(--cue)}.sb.sel{background:var(--ink);color:#fff;border-color:var(--ink)}.scaleends{display:flex;justify-content:space-between;font-size:11px;color:var(--slate);margin-top:6px;font-family:'IBM Plex Mono'}
  .research{border:1px solid var(--line);border-radius:20px;background:#fff;overflow:hidden;margin-bottom:18px;box-shadow:var(--shadow)}.rhead{padding:14px 18px;font-family:'Space Grotesk';font-weight:800;font-size:14px;background:var(--ink);color:#fff;display:flex;align-items:center;gap:8px}.rbody{padding:6px 18px 14px}.rrow{padding:13px 0;border-bottom:1px solid var(--line);display:grid;grid-template-columns:130px 1fr;gap:14px;align-items:start}.rrow:last-child{border-bottom:none}.rterm{font-family:'IBM Plex Mono';font-size:12px;color:var(--cue);font-weight:700;letter-spacing:.02em;line-height:1.4}.rdesc{font-size:13.5px;color:var(--ink-soft)}
  .debrief-wrap{margin:0 0 22px;border:1.5px solid var(--blue);border-radius:24px;overflow:hidden;box-shadow:var(--shadow);background:#fff}.debrief-head{background:linear-gradient(135deg,var(--blue),var(--ink));color:#fff;padding:13px 18px;display:flex;align-items:center;gap:10px}.debrief-logo{font-family:'Space Grotesk';font-weight:800;font-size:15px;letter-spacing:-.01em}.debrief-tag{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.75;border:1px solid rgba(255,255,255,.28);border-radius:999px;padding:2px 8px}.debrief-body{padding:18px;font-size:15px;line-height:1.7;color:var(--ink);background:#fff;min-height:60px}.debrief-body p{margin:0 0 10px}.debrief-body p:last-child{margin-bottom:0}.debrief-loading{color:var(--slate);font-size:14px;display:flex;align-items:center;gap:8px}
  @media(max-width:560px){.app{padding:0 12px 30px}.bar{gap:7px;padding:10px 10px;margin-bottom:14px}.logo{font-size:16px}.phase{font-size:9px}.stat{display:none!important}.qcard{padding:16px}.stem{font-size:18px;margin-bottom:16px}.gate{padding:12px;margin-top:10px}.gate h3{font-size:16px;align-items:flex-start}.prompt{font-size:14px}.badsent{font-size:15.5px;margin:8px 0 2px}.orb{width:62px;height:62px;border-radius:22px}.verdict{min-height:0;font-size:12px}.btnrow{gap:8px;margin-top:12px}.btn{width:100%;justify-content:center;padding:12px 16px}.rrow{grid-template-columns:1fr}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  /* ── compact demographics survey (mobile-first) ─────────────── */
  .demo{padding:18px 16px}.demo-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px dashed rgba(31,42,68,.08)}.demo-row:last-of-type{border-bottom:none}.demo-q{flex:1;font-size:15px;color:var(--ink);font-weight:600}.demo-age{font-family:'IBM Plex Mono';font-size:18px;font-weight:700;text-align:center;width:70px;padding:8px 6px;border:1.5px solid var(--line);border-radius:10px;background:#fff}.demo-age:focus{outline:none;border-color:var(--cue)}.chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end;max-width:60%}.chip{font-family:'Space Grotesk';font-weight:600;font-size:13.5px;padding:8px 12px;border:1.5px solid var(--line);background:#fff;border-radius:999px;cursor:pointer;color:var(--ink);transition:.12s;line-height:1}.chip:hover{border-color:var(--cue)}.chip.sel{background:var(--ink);color:#fff;border-color:var(--ink)}.demo-warn{display:none;color:var(--stop);font-weight:700;font-size:13px;margin-top:8px;text-align:center}.demo-go{width:100%}@media(max-width:560px){.demo-row{flex-direction:column;align-items:flex-start;gap:8px}.demo-q{font-size:14px}.chips{max-width:100%;justify-content:flex-start}.demo-age{width:90px;font-size:17px;padding:8px 4px}}

</style>

<body>
<div class="app">
  <div class="bar">
    <div class="logo">TOEIC Campus <small>/ Sprint</small></div>
    <div class="phase" id="phaseTag">Bắt đầu</div>
    <div class="spacer"></div>
    <div class="stat" id="scoreStat" style="display:none"><span>điểm</span><b id="scoreVal">0</b></div>
    <div class="stat" id="streakStat" style="display:none"><span>combo</span><b id="streakVal">0</b></div>
    <button class="infobtn" id="infoBtn" title="Chế độ nghiên cứu">i</button>
  </div>
  <div id="root"></div>
</div>

<script>
/* ============================================================
   THE STANDUP — retrieval-first redesign
   On error, the rule is HIDDEN. You must diagnose the mistake
   and say the rule from memory. Only after you produce it does
   the cue reveal itself — as confirmation, not a script to read.
   Help (a nudge, then the full rule) appears only when you're
   stuck: scaffolding is earned by struggle, never handed over.
   ============================================================ */

// PRACTICE bank — 30 items (3 / grammar point). Disjoint from TEST (shared gp only).
// Each item: id, gp, tense, ctx, stem (___ = blank), opts, answer, reveal, accept,
//            nudge, scaffold{point,concept,narrow,full}, apply{pre,blank,post,opts,answer}
const PRACTICE = [
  {id:"P01", gp:"present_perfect_since", tense:"Present Perfect — since/for", ctx:"Báo cáo kỹ thuật",
   stem:"The server ___ several performance issues since the last patch.", opts:["reports","reported","has reported","will report"], answer:2,
   reveal:["Thấy since → hiện tại hoàn thành"], accept:["present perfect","has reported","since","hiện tại hoàn thành"],
   nudge:"Khi thấy since thì dùng thì gì?",
   voiceCue:'Khi thấy "since" thì dùng...',
   scaffold:{point:"since", concept:"since + mốc quá khứ → việc bắt đầu từ đó còn kéo dài đến giờ → Present Perfect.", narrow:[2,3], full:"since → have/has + V3. Không dùng Simple Past."},
   apply:{pre:"Our policy", blank:true, post:" unchanged since 2020.", opts:["remains","remained","has remained"], answer:2}},

  {id:"P02", gp:"present_perfect_since", tense:"Present Perfect — since/for", ctx:"Thư xin việc",
   stem:"I ___ in software development for five years.", opts:["work","worked","have worked","am working"], answer:2,
   reveal:["for + khoảng thời gian → hiện tại hoàn thành"], accept:["present perfect","have worked","for","hiện tại hoàn thành"],
   nudge:"Khi thấy for + khoảng thời gian thì dùng thì gì?",
   voiceCue:'Khi thấy "for" + khoảng thời gian thì dùng...',
   scaffold:{point:"for", concept:"for + khoảng thời gian liên tục → Present Perfect.", narrow:[2,3], full:"for + khoảng thời gian → have/has + V3."},
   apply:{pre:"She", blank:true, post:" in this role for six months.", opts:["works","worked","has worked"], answer:2}},

  {id:"P03", gp:"present_perfect_since", tense:"Present Perfect — since/for", ctx:"Cuộc họp",
   stem:"The committee ___ on this policy since January.", opts:["debates","debated","has debated","is debating"], answer:2,
   reveal:["since tháng 1 → hiện tại hoàn thành"], accept:["present perfect","since","has debated","hiện tại hoàn thành"],
   nudge:"Khi thấy since thì dùng thì gì?",
   voiceCue:'Khi thấy "since" + mốc thời gian thì dùng...',
   scaffold:{point:"since", concept:"since + mốc thời gian → việc kéo dài đến hiện tại → Present Perfect (have/has + V3).", narrow:[1,2], full:"since → have/has + V3. Không dùng hiện tại đơn hay quá khứ đơn."},
   apply:{pre:"They", blank:true, post:" the issue since the client raised it.", opts:["discuss","discussed","have been discussing"], answer:2}},

  {id:"P04", gp:"past_perfect_bytime", tense:"Past Perfect — by the time", ctx:"Báo cáo dự án",
   stem:"By the time the manager called, the staff ___ all the data.", opts:["compile","compiled","has compiled","had compiled"], answer:3,
   reveal:["By the time + quá khứ đơn → vế kia dùng Past Perfect"], accept:["past perfect","had compiled","by the time","quá khứ hoàn thành"],
   nudge:"Khi thấy By the time + quá khứ thì vế còn lại dùng thì gì?",
   voiceCue:'Khi thấy "By the time" + quá khứ đơn thì dùng...',
   scaffold:{point:"By the time", concept:"By the time + Past Simple → vế kia phải dùng Past Perfect (sự việc xảy ra TRƯỚC).", narrow:[2,3], full:"By the time + V-ed → had + V3 cho vế kia."},
   apply:{pre:"By the time we arrived, the meeting", blank:true, post:" already begun.", opts:["has","had","was"], answer:1}},

  {id:"P05", gp:"past_perfect_bytime", tense:"Past Perfect — by the time", ctx:"Email thông báo",
   stem:"By the time the email was sent, the decision ___.", opts:["makes","made","has been made","had been made"], answer:3,
   reveal:["By the time + quá khứ đơn → had + V3 (passive)"], accept:["past perfect","had been made","by the time","quá khứ hoàn thành"],

// Stem rendering: support BOTH item.stem (single string) AND item.pre+item.post (split).
// Banks migrated from the older schema still use item.stem; the new spec banks use pre+post.
function _stemText(item) {
  if (item.stem != null) {
    // Split on the FIRST '___' placeholder if present, else inject ? after the verb slot
    const s = item.stem;
    const m = s.split('___');
    return { pre: m[0], post: m.slice(1).join('___') };
  }
  return { pre: item.pre || '', post: item.post || '' };
}
function stemBlank(item){const t=_stemText(item);return `${t.pre}<span class="blank">?</span>${t.post}`;}
function stemFilled(item,wrongWord){const t=_stemText(item);return `${t.pre}<span class="filled">${wrongWord}</span>${t.post}`;}
function transferStemFilled(item,wrongWord){const a=item.apply||{};return `${a.pre||''}<span class="filled">${wrongWord}</span>${a.post||''}`;}

//   - 3-digit P001..P999 → enroll with that id (server checks uniqueness).
//   - 4-digit P9999 → ADMIN MODE: caller picks exp/ctrl manually for QA.

function intro(){

       </div>
     </div>

     <div class="btnrow" style="margin-top:18px"><button class="btn primary" id="startBtn" disabled>Vào ca luyện →</button></div>
   </div>`;

  const pidInput = document.getElementById("pidInput");
  const startBtn = document.getElementById("startBtn");
  const pidHint = document.getElementById("pidHint");

  // Restore only valid display ids; hide legacy UUID-style ids from old builds.
  const remembered = (localStorage.getItem("toeic_pid") || "").toUpperCase();
  if (/^P(\d{3}|9999)$/.test(remembered)) pidInput.value = remembered.replace(/^P/, "");

  function refreshButton() {
    const raw = (pidInput.value || "").trim();
    pidHint.textContent = "";
    pidHint.style.color = "var(--slate)";
    if (!raw) { startBtn.disabled = true; startBtn.textContent = "Nhập số thí sinh →"; return; }
    if (!/^[0-9]+$/.test(raw)) {
      startBtn.disabled = true;
      pidHint.textContent = "Chỉ chấp nhận chữ số."; pidHint.style.color = "var(--stop)"; return;
    }
    if (raw.length === 4) {
      // Admin path
      if (raw === "9999") {
        startBtn.disabled = false;
        startBtn.textContent = "Admin: chọn nhóm thủ công →";
        pidHint.textContent = "Admin mode (P9999): bạn sẽ được chọn nhóm thủ công để QA."; return;
      } else {
        startBtn.disabled = true;
        pidHint.textContent = "P9999 là admin; với người tham gia chỉ 3 chữ số."; pidHint.style.color = "var(--stop)"; return;
      }
    }
    if (raw.length !== 3) {
      startBtn.disabled = true;
      pidHint.textContent = "Cần đúng 3 chữ số (vd 001) hoặc 4 chữ số 9999 (admin)."; pidHint.style.color = "var(--stop)"; return;
    }
    const n = parseInt(raw, 10);
    if (n < 1 || n > 999) {
      startBtn.disabled = true;
      pidHint.textContent = "Số thí sinh phải trong 001–999."; pidHint.style.color = "var(--stop)"; return;
    }
    startBtn.disabled = false;
    startBtn.textContent = "Vào ca luyện →";
  }

  pidInput.addEventListener("input", refreshButton);
  refreshButton();

  startBtn.onclick = async () => {
    const raw = (pidInput.value || "").trim();
    startBtn.disabled = true;
    startBtn.textContent = "Đang chuẩn bị…";
    try {
      if (raw.length === 4 && raw === "9999") {
        await enrollAdmin();
      } else {
        await ensureEnrolled("P" + raw);
        // Resume to correct phase — check localStorage first, fallback to server
        let sid      = localStorage.getItem("toeic_session_id_" + participantId);
        let postDone = localStorage.getItem("toeic_post_done_"  + participantId);
        let preDone  = localStorage.getItem("toeic_pre_done_"   + participantId);
        const demoDone = localStorage.getItem("toeic_demo_done_" + participantId);
        const savedGrp = localStorage.getItem("toeic_group_"     + participantId);
        if (savedGrp) group = savedGrp;
        // If localStorage missing milestones, ask server for current status
        if (demoDone && !postDone) {
          try {
            const st = await fetch(API_BASE + "/api/status/" + participantId).then(r=>r.json());
            if (st && st.group) group = st.group;
            if (st && st.session_id) {
              sid = st.session_id;
              postDone = "1";
              preDone  = "1";
              preScore  = st.pre_score  || 0;
              postScore = st.post_score || 0;
              score     = st.practice_score || 0;
              // backfill localStorage so next reload is instant
              localStorage.setItem("toeic_session_id_" + participantId, sid);
              localStorage.setItem("toeic_post_done_"  + participantId, "1");
              localStorage.setItem("toeic_pre_done_"   + participantId, "1");
              localStorage.setItem("toeic_group_"      + participantId, group);
              localStorage.setItem("toeic_scores_"     + participantId, JSON.stringify({pre: preScore, post: postScore, practice: score}));
            }
          } catch(_) {}
        }
        if (postDone && sid) {
          // Already completed — restore scores and show results/debrief
          if (!preScore && !postScore) {
            try {
              const sc = JSON.parse(localStorage.getItem("toeic_scores_" + participantId) || "{}");
              preScore = sc.pre || 0; postScore = sc.post || 0; score = sc.practice || 0;
            } catch(_) {}
          }
          results();
        } else if (preDone) {
          startPractice();
        } else if (demoDone) {
          startTest("pre");
        } else {
          showDemographicsSurvey();
        }
      }
    } catch (e) {
      pidHint.textContent = e.message || "Có lỗi — thử lại.";
      pidHint.style.color = "var(--stop)";
      refreshButton();
    }
  };
}

// Enroll helper. `requestedId` (optional) is what the user typed on the intro
// screen (e.g. "P042"). When provided, the server checks uniqueness and rejects
// duplicates (HTTP 409). When omitted (e.g. recovering from a stale session),
// server auto-generates a uuid8 id (legacy fallback).
async function ensureEnrolled(requestedId){
  const cached = localStorage.getItem("toeic_pid");
  if (cached && (!requestedId || cached.toUpperCase() === requestedId.toUpperCase())) {
    participantId = cached;
    return participantId;
  }
  try{
    const res = await fetch(API_BASE + "/api/enroll", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(requestedId ? {participant_id: requestedId} : {}),
    });
    const data = await res.json();
    if (data && data.participant_id){
      participantId = data.participant_id;
      localStorage.setItem("toeic_pid", participantId);
      return participantId;
    }
    if (!res.ok) throw new Error(data.error || `enroll failed (${res.status})`);
  }catch(e){ throw e; }
  return participantId;
}

let testIdx=0,testRight=0,testKind="pre";
function startTest(kind){testKind=kind;testIdx=0;testRight=0;renderTestItem();}
function renderTestItem(){
  const isDelayed=testKind==="delayed";
  setPhase(testKind==="pre"?"Đầu vào":isDelayed?"Sau 2 tuần":"Kiểm tra cuối");showStats(false);
  const item=TEST[testIdx];
  const testLabel=testKind==="pre"?"Kiểm tra trước khi luyện":isDelayed?"Kiểm tra sau 2 tuần":"Kiểm tra sau khi luyện";
  root.innerHTML=`
   <div class="scene">${dots(TEST.length,testIdx)}
     <div class="eyebrow">${testLabel} · ${testIdx+1}/${TEST.length}</div>
     <div class="qcard"><div class="qctx">${item.ctx}</div><div class="stem">${stemBlank(item)}</div>
       <div class="opts">${item.opts.map((o,i)=>`<button class="opt" data-i="${i}"><span class="key">${"ABCD"[i]}</span>${o}</button>`).join("")}</div></div>
     </div>`;
  root.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
    if(+b.dataset.i===item.answer)testRight++;
    root.querySelectorAll(".opt").forEach(x=>x.disabled=true);b.style.borderColor="var(--ink)";
    setTimeout(()=>{testIdx++;
      if(testIdx<TEST.length)renderTestItem();
      else if(testKind==="pre"){preScore=testRight;assignThenPractice();}
      else if(testKind==="delayed"){showDelayedResults(testRight);}
      else{postScore=testRight;results();}},240);
  });
}

  setPhase("Phân nhóm");

  try{
    if(!participantId) await ensureEnrolled();
    const res=await fetch(API_BASE+"/api/assign",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({participant_id:participantId,pre_total:testRight}),
    });
    const data=await res.json();
    if(data&&(data.group==="exp"||data.group==="ctrl")) group=data.group;
  }catch(e){ /* offline: fall back to current `group` default so the session can continue */ }
  localStorage.setItem("toeic_pre_done_" + participantId, "1");
  localStorage.setItem("toeic_group_" + participantId, group);
  startPractice();
}

// ---------------- PRACTICE ----------------
function startPractice(){queue=PRACTICE.map((_,i)=>i);score=0;streak=0;_attempts=[];showStats(true);refreshStats();nextPractice();}
function nextPractice(){
  if(queue.length===0){startTest("post");return;}
  renderFresh(queue[0]);
}

function renderFresh(idx){
  const item=PRACTICE[idx];const total=PRACTICE.length;
  const done=total-queue.length;
  _itemStart=Date.now(); _scaffoldLevel=0;
  setPhase("Luyện tập");
  root.innerHTML=`
   <div class="scene">${dots(total,Math.min(done,total-1))}
     ${bossBlock("neutral","Bắt đầu nhé. Chọn đáp án đúng cho câu này.",false)}
     <div class="qcard"><div class="qctx">${item.ctx}</div><div class="stem">${stemBlank(item)}</div>
       <div class="opts">${item.opts.map((o,i)=>`<button class="opt" data-i="${i}"><span class="key">${"ABCD"[i]}</span>${o}</button>`).join("")}</div></div>
     <div id="gateMount"></div></div>`;
  root.querySelectorAll(".opt").forEach(b=>b.onclick=()=>answerFresh(idx,+b.dataset.i,b));
}
function answerFresh(idx,choice,btn){
  const item=PRACTICE[idx];
  root.querySelectorAll(".opt").forEach(x=>x.disabled=true);
  if(choice===item.answer){
    btn.classList.add("correct");score+=10;streak++;refreshStats();
    _attempts.push({qIdx:idx,gp:item.gp,item_id:item.id,phase:"fresh",tense:item.tense,correct:true,attempts:1,ms_spent:_itemStart?Date.now()-_itemStart:0,scaffold_level:_scaffoldLevel});
    bossReact("happy",praise());queue.shift();setTimeout(nextPractice,950);
  }else{
    btn.classList.add("wrong","shake");streak=0;refreshStats();
    _attempts.push({qIdx:idx,gp:item.gp,item_id:item.id,phase:"fresh",tense:item.tense,correct:false,attempts:1,wrongWord:item.opts[choice],ms_spent:_itemStart?Date.now()-_itemStart:0,scaffold_level:_scaffoldLevel});
    diagnoseGate(idx,item.opts[choice],"fresh");
  }
}

function gateComplete(idx,kind){
  if(_gateStart && _attempts.length){
    _attempts[_attempts.length-1].gateMs = Date.now()-_gateStart;   // thời gian đọc quy tắc
    _attempts[_attempts.length-1].scaffold_level = _scaffoldLevel;  // 0=none, 1=cue, 2=rule
    _gateStart=0;
  }
  if(kind==="fresh") renderTransfer(idx);
  else { queue.shift(); setTimeout(nextPractice,250); }
}

// transfer: same rule, new sentence, exactly once after a fresh error
function renderTransfer(idx){
  const item=PRACTICE[idx];const a=item.apply;const total=PRACTICE.length;
  const done=total-queue.length;
  _itemStart=Date.now(); _scaffoldLevel=0;
  setPhase("Luyện tập");
  root.innerHTML=`
   <div class="scene">${dots(total,Math.min(done,total-1))}
     ${bossBlock("neutral","Cùng một luật — câu mới. Thử chuyển hóa xem.",false)}
     <div class="qcard"><div class="qctx">Câu chuyển hóa · luật này bạn vừa gặp</div>
       <div class="stem">${a.pre}<span class="blank">?</span>${a.post}</div>
       <div class="opts">${a.opts.map((o,i)=>`<button class="opt" data-i="${i}"><span class="key">${"ABC"[i]}</span>${o}</button>`).join("")}</div></div>
     <div id="gateMount"></div></div>`;
  root.querySelectorAll(".opt").forEach(b=>b.onclick=()=>{
    root.querySelectorAll(".opt").forEach(x=>x.disabled=true);
    if(+b.dataset.i===a.answer){
      b.classList.add("correct");score+=14;streak++;refreshStats();
      _attempts.push({qIdx:idx,gp:item.gp,item_id:item.id,phase:"transfer",tense:item.tense,correct:true,attempts:1,ms_spent:_itemStart?Date.now()-_itemStart:0,scaffold_level:_scaffoldLevel});
      bossReact("happy","Đã chuyển hóa được. Tốt.");queue.shift();setTimeout(nextPractice,950);
    }else{
      b.classList.add("wrong","shake");
      root.querySelector(`.opt[data-i="${a.answer}"]`).classList.add("correct");
      streak=0;refreshStats();
      _attempts.push({qIdx:idx,gp:item.gp,item_id:item.id,phase:"transfer",tense:item.tense,correct:false,attempts:1,wrongWord:a.opts[+b.dataset.i],ms_spent:_itemStart?Date.now()-_itemStart:0,scaffold_level:_scaffoldLevel});
      diagnoseGate(idx,a.opts[+b.dataset.i],"transfer");
    }
  });
}
function praise(){const p=["Gọn. Câu tiếp.","Chuẩn rồi.","Đúng đáp án.","Tốt — giữ nhịp.","Nhanh đấy."];return p[Math.floor(Math.random()*p.length)];}

function ruleTextVI(item){
  if(item.scaffold?.full) return item.scaffold.full;
  const t=(item.tense||'').toLowerCase();
  const ctx=(item.ctx||'').toLowerCase();
  if(t.includes('present perfect')) return 'Thấy since hoặc for + mốc/khoảng thời gian → chọn ngay Hiện tại hoàn thành: have/has + V3/ed.';
  if(t.includes('past perfect')) return 'Thấy By the time + mệnh đề Quá khứ đơn → vế còn lại chọn Quá khứ hoàn thành: had + V3/ed.';
  if(t.includes('plural')) return 'Thấy A number of + danh từ số nhiều → chọn động từ số nhiều: are/were/have/do. Khác với The number of → số ít.';
  if(t.includes('singular')) return 'Thấy chủ ngữ bắt đầu bằng Each hoặc Every → chọn ngay động từ số ít: is/was/has/does.';
  if(t.includes('preposition')) return item.scaffold?.full || (item.reveal||[]).join(' ');
  if(t.includes('gerund')) return item.scaffold?.full || (item.reveal||[]).join(' ');
  if(t.includes('comparative')) return 'Thấy than → chọn ngay dạng so sánh hơn: tính từ ngắn thêm -er, tính từ dài dùng more + adjective.';
  if(t.includes('conditional')) return 'Thấy If và vế chính có will → câu điều kiện loại 1. Vế If chia hiện tại đơn, tuyệt đối không dùng will sau If.';
  if(ctx.includes('logistics')) return 'Có already và been dispatched → chắc chắn là thì hoàn thành/bị động. Chủ ngữ The shipment số ít → chọn has.';
  if(ctx.includes('tuyển dụng')) return 'Thấy Neither of + danh từ số nhiều → trong TOEIC/formal English, động từ chia số ít → chọn is.';
  if(ctx.includes('kết email')) return 'Cụm look forward to là cấu trúc cố định: to là giới từ, không phải to-V → sau to dùng V-ing hoặc noun.';
  return (item.reveal||[]).join(' ');
}

// ---------------- THE DIAGNOSE GATE (symmetric: both groups see identical scaffold) ----------------
// minDelay = thời gian (ms) nhóm ctrl phải đọc thầm trước khi mở khóa Continue.
// Đây là biến cân chỉnh để ≈ thời gian trung bình nhóm exp dành cho bước nói.
let minDelay=15000;
let _gateStart=0;   // timestamp mở gate đọc-to/đọc-thầm (đo time-on-task để cân 2 nhóm)

// Both groups go through the SAME scaffold, then diverge ONLY at the
// "phát biểu quy tắc" step: exp speaks (mic→Whisper→check), ctrl reads
// silently then confirms after `minDelay`. No information asymmetry.
function diagnoseGate(idx,wrongWord,kind="fresh"){
  const item=PRACTICE[idx];
  const mount=document.getElementById("gateMount");
  const badSentence = kind==="transfer" ? transferStemFilled(item,wrongWord) : stemFilled(item,wrongWord);
  _gateStart=Date.now();   // mốc mở gate — để đo time-on-task, cân thời gian giữa 2 nhóm
  _scaffoldLevel=0;        // reset scaffold tracker cho câu này
  // R2-C: recall-first. exp nói ra qua mic; ctrl nhớ lại trong đầu rồi đọc thầm.
  // Sau bước recall → hiện cue card + rule để đọc thầm, cùng lượng thông tin.
  bossReact("wait","Sai rồi. Hãy nhớ lại quy tắc trước — đừng nhìn đáp án.");
  mount.innerHTML=`
    <div class="gate">
      <h3><span class="lock-tag">Thử thách ngữ pháp</span></h3>
      <p class="prompt">${group==="exp"?"Hãy nói ra ngữ pháp đúng của câu, nói theo dạng \"Khi thấy ... thì dùng ...\"":"Hãy suy luận ngữ pháp đúng và hệ thống quy tắc đó theo dạng: \"Khi thấy ... thì dùng ...\""}</p>
      <div class="badsent">${badSentence}</div>
      <p class="prompt">${group==="exp"?"Bấm mic và bắt đầu nói, take it easy.":""}</p>
      <div id="speakMount"></div>
    </div>`;
  renderSpeakStep(idx,kind);
}

// Shared scaffold shown identically to BOTH groups.
// (P0: a think-first prompt → single rule reveal. P1-G upgrades this to
//  the 4-tier progressive scaffold from §2.3 — still shared by both groups.)
// The speak/read-silent step (renderSpeakStep) is ALWAYS rendered together with
// the scaffold — both groups must verbalize the rule internally. The DIFFERENCE
// is only HOW: exp speaks aloud (mic → Whisper → check-rule); ctrl reads silently
// with a minDelay unlock. This is the single between-group variable.
function renderScaffold(idx){
  const item=PRACTICE[idx];
  const mount=document.getElementById("scaffoldMount");
  let tier=1;
  const point=item.scaffold?.point || "tín hiệu";
  const concept=item.scaffold?.concept || item.nudge || "Nhìn tín hiệu trong câu và gọi tên quy tắc.";
  const narrow=(item.scaffold?.narrow||[]).map(i=>item.opts?.[i]).filter(Boolean);
  function render(){
    let body=`<div class="nudge" id="thinkPrompt"><b>Gợi ý ${tier}/3:</b> `;
    if(tier===1){
      body+=`Chú ý từ <span class="hl">${point}</span> trong câu — nó gợi quy tắc gì?`;
    }else if(tier===2){
      body+=concept;
    }else{
      const pair=narrow.length?narrow.join("</b> / <b>"):"hai lựa chọn gần nhất";
      body+=`Thu hẹp lại — đáp án đúng nằm giữa: <b>${pair}</b>. Quy tắc nào quyết định?`;
    }
    body+=`</div>`;
    const moreBtn=tier<3
      ? `<div class="btnrow" style="justify-content:center"><button class="btn ghost" id="showHint">Vẫn chưa rõ →</button></div>`
      : `<p class="tiny center">Hết gợi ý. Hãy tự nói/đọc lại quy tắc bên dưới — quy tắc đầy đủ mở sau bước đó.</p>`;
    mount.innerHTML=body+moreBtn;
    const b=document.getElementById("showHint");
    if(b) b.onclick=()=>{tier++;render();};
  }
  render();
}

// The ONLY between-group difference: speak aloud (exp) vs read silently (ctrl).
function renderSpeakStep(idx,kind="fresh"){
  const item=PRACTICE[idx];
  const mount=document.getElementById("speakMount");
  if(group==="exp"){
    mount.innerHTML=`
      <div class="micwrap">
        <button class="orb" id="orb">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M5 10v1a7 7 0 0 0 14 0v-1M12 18v4"/></svg>
        </button>
        <div class="miclabel" id="micLabel"></div>
        <div class="transcript empty" id="trans">— lời bạn nói sẽ hiện ở đây —</div>
        <div class="verdict" id="verdict"></div>
      </div>
      <div id="cueMount"></div>
      <div id="aidMount"></div>
      <div class="btnrow" id="gateBtns" style="justify-content:center"></div>
      <div id="revMount"></div>`;
    wireMic(idx,kind);
  }else{
    // ctrl: recall silently for minDelay, then read the same cue + rule silently.
    mount.innerHTML=`
      <div class="nudge" id="ctrlDwell">Gợi ý sẽ xuất hiện sau <b id="ctrlCountdown">${Math.ceil(minDelay/1000)}</b> giây…</div>
      <div id="cueMount"></div>
      <div id="ctrlAfter"></div>`;
    const cd=document.getElementById("ctrlCountdown");
    let left=Math.ceil(minDelay/1000);
    const tick=setInterval(()=>{left--; if(cd) cd.textContent=Math.max(left,0);},1000);
    setTimeout(()=>{
      clearInterval(tick);
      _scaffoldLevel=2;  // ctrl sees cue + full rule after silent-recall dwell
      const cueMount=document.getElementById("cueMount");
      const after=document.getElementById("ctrlAfter");
      const dwell=document.getElementById("ctrlDwell");
      if(dwell) dwell.innerHTML="Đã hết thời gian. Hãy xem gợi ý và quy tắc đầy đủ dưới đây.";
      cueMount.innerHTML=cueHintHTML(item);
      after.innerHTML=revealHTML(item);
      after.insertAdjacentHTML("beforeend", `<div class="btnrow" style="justify-content:center"><button class="btn primary" id="ctrlGo">Tôi đã đọc xong →</button></div>`);
      document.getElementById("ctrlGo").onclick=()=>gateComplete(idx,kind);
    },minDelay);
  }
}

// R2-B: cue card sau recall fail.
// exp: cue + tiếp tục nói qua mic (Whisper verify cue match trong item.accept)
// ctrl: cue + bấm "Tôi đã đọc cue" → reveal rule
function showCueCard(item, idx, kind, recalled){
  _scaffoldLevel=1;  // cue card = scaffold level 1
  const cueMount = document.getElementById("cueMount");
  const after    = document.getElementById("ctrlAfter") || document.getElementById("revMount");
  if(group==="exp"){
    // Exp group must actively recall again after the cue; no continue/reveal button
    // until the mic check passes or the learner reaches attempt > 2.
    cueMount.innerHTML = cueHintHTML(item);
    return;
  }
  cueMount.innerHTML = cueHintHTML(item) + `
    <div class="btnrow" style="justify-content:center">
      <button class="btn primary" id="cueOk">Tôi đã đọc cue → mở quy tắc</button>
    </div>`;
  document.getElementById("cueOk").onclick=()=>{
    _scaffoldLevel=2;  // rule revealed = scaffold level 2
    after.innerHTML = revealHTML(item);
    after.insertAdjacentHTML("beforeend", `<div class="btnrow" style="justify-content:center"><button class="btn primary" id="finalGo">Tiếp tục →</button></div>`);
    document.getElementById("finalGo").onclick=()=>gateComplete(idx,kind);
    cueMount.innerHTML="";
  };
}

function revealHTML(item){
  const ruleHTML = ruleTextVI(item)
    .replace(/(since|for|have\/has \+ V3|had \+ V3|A number of|Each|every|responsible for|V-ing|than|If \+ hiện tại đơn|will \+ V)/gi,
      '<span class="hl">$1</span>');
  return `<div class="reveal"><div class="lab">✓ đây là quy tắc đúng</div><p class="rule">${ruleHTML}</p></div>`;
}

// R2-B cue card: hiện ngay sau khi recall fail lần 1.
// Pattern "Khi thấy X thì dùng Y" giúp học sinh học metacognitive strategy.
function cueHintHTML(item){
  const cue = item.voiceCue || `Khi thấy "${item.scaffold?.point||'tín hiệu'}" thì dùng...`;
  return `<div class="cue-card"><div class="cue-kicker">💡 Gợi ý phương hướng</div><p class="cue-text">${cue}</p></div>`;
}

function wireMic(idx,kind="fresh"){
  const item=PRACTICE[idx];
  const orb=document.getElementById("orb"),label=document.getElementById("micLabel"),
        trans=document.getElementById("trans"),verdict=document.getElementById("verdict"),
        btns=document.getElementById("gateBtns"),aid=document.getElementById("aidMount"),rev=document.getElementById("revMount");
  let attempts=0;

  function solve(){
    orb.classList.remove("live","processing");orb.classList.add("ok");
    orb.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 13l4 4L19 7"/></svg>`;
    verdict.className="verdict good";verdict.textContent="✓ Tốt — bạn đã đọc to quy tắc.";
    label.textContent="Bạn vừa đọc to quy tắc. Đọc to giúp nhớ lâu hơn đọc thầm.";
    document.querySelector(".gate").classList.add("solved");
    document.querySelector(".lock-tag").classList.add("go");
    document.querySelector(".lock-tag").textContent="đã nhớ";
    score+=8;refreshStats();bossReact("happy","Đúng hướng rồi. Đi tiếp.");
    // tag the last attempt with the voice text they used to solve it
    if(_attempts.length && _lastVoice){
      _attempts[_attempts.length-1].voiceText = _lastVoice;
      _attempts[_attempts.length-1].whisper_raw = _whisperRaw;
    }
    aid.innerHTML="";
    btns.innerHTML=`<button class="btn primary" id="go">Tiếp tục →</button>`;
    document.getElementById("go").onclick=()=>gateComplete(idx,kind);
  }
  function showNudge(){ aid.innerHTML=""; showCueCard(item, idx, kind, /*recalled=*/false); }
  function offerRule(){
    _scaffoldLevel=2;  // full rule revealed = scaffold level 2
    const cueMount=document.getElementById("cueMount");
    if(cueMount) cueMount.innerHTML="";
    if(rev) rev.innerHTML = revealHTML(item);
    label.textContent="Đọc to quy tắc ở trên một lần nữa rồi tiếp tục.";
    // Keep only one continue path after reveal to avoid duplicate CTA buttons.
    btns.innerHTML=`<button class="btn ghost" id="retry">Đọc lại</button>
                    <button class="btn amber" id="ovr">Tôi đã đọc to →</button>`;
    document.getElementById("retry").onclick=()=>{verdict.textContent="";trans.textContent="— lời bạn đọc sẽ hiện ở đây —";trans.className="transcript empty";};
    document.getElementById("ovr").onclick=solve;
  }

  // ── Groq-powered check: STT transcript → /api/check-rule ──────────
  async function checkWithGroq(text){
    _lastVoice = text;  // capture for debrief
    _whisperRaw = text; // raw whisper transcript (for distortion analysis)
    trans.textContent=text||"(không nghe thấy gì)";trans.className="transcript";
    const onlyLetter=/^\s*(answer\s*)?[a-d]\.?\s*$/i.test(text)||/option [a-d]/i.test(text.toLowerCase());
    // R2-B: After cue, exp must pass via mic; only attempt > 2 can reveal rule.
    if(onlyLetter){
      attempts++;verdict.className="verdict bad";
      verdict.textContent="Nói quy tắc, không chỉ nói chữ đáp án.";
      label.textContent="Bấm mic và thử lại một lần nữa.";orb.classList.remove("live","processing");
      if(attempts>2)offerRule(); else showNudge();
      return;
    }
    // Call /api/check-rule
    orb.classList.add("processing");label.textContent="Mentor đang kiểm tra phần bạn đọc…";verdict.textContent="";
    try{
      const fd=new FormData();
      fd.append("text",text);
      fd.append("tense",item.tense||"");
      fd.append("accept",JSON.stringify(item.accept||[]));
      fd.append("lang","vi");
      if(item.id) fd.append("item_id", item.id);
      if(item.gp) fd.append("gp", item.gp);
      const res=await fetch(API_BASE+"/api/check-rule",{method:"POST",body:fd});
      const data=await res.json();
      orb.classList.remove("processing");
      if(data.passed){solve();}
      else{
        attempts++;
        verdict.className="verdict bad";
        verdict.textContent=data.feedback||"Chưa đủ — hãy nói rõ quy tắc ngữ pháp.";
        label.textContent="Bấm mic và thử lại một lần nữa.";orb.classList.remove("live");
        if(attempts>2) offerRule();
        else showNudge();
      }
    }catch(e){
      // Network error — treat as "could not verify". Do NOT fallback to local
      // accept-list matching here; doing so can pass on cached / hallucinated
      // transcripts and break RCT validity. Surface a neutral fail instead.
      orb.classList.remove("processing");
      attempts++;
      verdict.className="verdict bad";
      verdict.textContent="Chưa đủ — hãy nói rõ quy tắc ngữ pháp.";
      label.textContent="Bấm mic và thử lại một lần nữa.";orb.classList.remove("live");
      if(attempts>2) offerRule();
      else showNudge();
    }
  }

  // ── Groq Whisper recorder ─────────────────────────────────────────
  async function recordAndTranscribe(){
    if(!navigator.mediaDevices){
      label.textContent="Không dùng được mic — hãy gõ bên dưới.";
      showTypeFallback();return;
    }
    let stream;
    try{ stream=await navigator.mediaDevices.getUserMedia({audio:true}); }
    catch(e){ label.textContent="Bạn chưa cấp quyền mic — hãy gõ bên dưới.";showTypeFallback();return; }

    const mr=new MediaRecorder(stream,{mimeType:MediaRecorder.isTypeSupported("audio/webm")?"audio/webm":"audio/mp4"});
    const chunks=[];
    mr.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};

    // RMS amplitude sampling to detect silent / near-silent recordings and
    // prevent Whisper hallucination from being accepted by check-rule.
    let audioCtx=null, analyser=null, sampleBuf=null, sampleTimer=null, maxRms=0;
    try{
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      const source = audioCtx.createMediaStreamSource(stream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 1024;
      source.connect(analyser);
      sampleBuf = new Uint8Array(analyser.frequencyBinCount);
      const tick = ()=>{
        if(!analyser) return;
        analyser.getByteTimeDomainData(sampleBuf);
        let sum=0;
        for(let i=0;i<sampleBuf.length;i++){
          const v = (sampleBuf[i]-128)/128;
          sum += v*v;
        }
        const r = Math.sqrt(sum/sampleBuf.length);
        if (r > maxRms) maxRms = r;
      };
      sampleTimer = setInterval(tick, 80);
    }catch(e){
      // AudioContext unavailable on this device — fall back to size guard only.
      audioCtx=null;
    }

    const startTime = Date.now();
    mr.start();
    orb.classList.add("live");label.textContent="Đang ghi âm… bấm lần nữa để dừng";verdict.textContent="";
    orb._stop=()=>{
      mr.stop();stream.getTracks().forEach(t=>t.stop());
      orb._stop=null;
    };
    mr.onstop=async()=>{
      if (sampleTimer) {clearInterval(sampleTimer); sampleTimer=null;}
      if (audioCtx) {try{audioCtx.close();}catch(e){} audioCtx=null;}
      analyser=null;
      orb.classList.remove("live");orb.classList.add("processing");
      label.textContent="Groq Whisper đang nghe lại…";
      const dur = Date.now() - startTime;
      const blob=new Blob(chunks,{type:mr.mimeType});
      if(blob.size<500){
        orb.classList.remove("processing");
        label.textContent="Quá ngắn — hãy nói ít nhất 1 giây.";return;
      }
      if(dur<700){
        orb.classList.remove("processing");
        label.textContent="Quá ngắn — hãy giữ mic tối thiểu 1 giây.";return;
      }
      if(maxRms<0.02){
        orb.classList.remove("processing");
        label.textContent="Không nghe thấy gì — hãy nói to và rõ hơn vào mic.";return;
      }
      try{
        const fd=new FormData();
        fd.append("audio",blob,"audio.webm");
        fd.append("lang","vi");
        // Send grammar point + cue word so Whisper biases vocabulary without
        // leaking the answer. Backend builds a per-item prompt from these.
        if(item.gp)              fd.append("gp",    item.gp);
        if(item.scaffold?.point) fd.append("point", item.scaffold.point);
        if(item.accept?.length)  fd.append("accept", JSON.stringify(item.accept));
        const res=await fetch(API_BASE+"/api/transcribe",{method:"POST",body:fd});
        const data=await res.json();
        orb.classList.remove("processing");
        const text=(data.text||"").trim();
        if(text.length>=12){
          await checkWithGroq(text);
        }else if(text.length>0){
          orb.classList.remove("processing");
          label.textContent="Chưa nghe rõ — hãy nói to hơn và rõ hơn.";
        }else{
          orb.classList.remove("processing");
          label.textContent="Chưa nghe rõ — hãy nói to hơn và rõ hơn.";
        }
      }catch(e){
        // Network error — treat as "not heard", do NOT fallback to cached
        // _lastVoice text which could pass the keyword check incorrectly.
        orb.classList.remove("processing");
        label.textContent="Có lỗi mạng — bấm để thử lại.";
      }
    };
  }

  function showTypeFallback(){
    orb.style.display="none";
    btns.innerHTML=`<input id="typed" placeholder="e.g. since → present perfect" style="font-family:'IBM Plex Mono';font-size:14px;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;width:260px;max-width:100%">
      <button class="btn primary" id="sub">Check</button>`;
    document.getElementById("sub").onclick=()=>checkWithGroq(document.getElementById("typed").value);
  }

  // ── Orb click: toggle record / stop ──────────────────────────────
  orb.onclick=()=>{
    if(orb._stop){orb._stop();return;}
    recordAndTranscribe();
  };

  // ── Type fallback always available below orb ──────────────────────
  btns.innerHTML=`<input id="typed" placeholder="Hoặc gõ lại quy tắc…" style="font-family:'IBM Plex Mono';font-size:13px;padding:9px 12px;border:1.5px solid var(--line);border-radius:10px;width:240px;max-width:100%;color:var(--ink)">
    <button class="btn ghost" id="sub" style="font-size:13px;padding:10px 16px">Kiểm tra</button>`;
  document.getElementById("sub").onclick=()=>{
    const v=document.getElementById("typed").value.trim();
    if(v)checkWithGroq(v);
  };
}

function _streamDebrief(session_id) {
  const body = document.getElementById("debriefBody");
  if (!body || !session_id) return;
  body.innerHTML = `<div class="debrief-loading"><span class="waiting"><i></i><i></i><i></i></span> Mentor đang đọc buổi luyện của bạn…</div>`;

  let text = "";
  let gotChunk = false;
  let evts = null;

  const renderChunk = (chunk) => {
    gotChunk = true;
    text += chunk;
    body.textContent = text;
    body.scrollIntoView({behavior:"smooth",block:"nearest"});
  };

  const fallbackFetch = async () => {
    if (gotChunk) return;
    try {
      if (evts) evts.close();
      const raw = await fetch(API_BASE + "/api/debrief/" + session_id, {cache:"no-store"}).then(r=>r.text());
      let full = "";
      raw.split(/\r?\n/).forEach(line => {
        if (!line.startsWith("data: ")) return;
        const d = line.slice(6).trim();
        if (!d || d === "[DONE]") return;
        try { full += JSON.parse(d).text || ""; } catch(_) {}
      });
      if (full) _renderDebrief(body, full);
      else body.innerHTML = `<span style="color:var(--slate)">Mentor chưa trả nội dung — thử tải lại trang.</span>`;
    } catch(e) {
      body.innerHTML = `<span style="color:var(--slate)">Không kết nối được Mentor (${e.message}).</span>`;
    }
  };

  try {
    evts = new EventSource(API_BASE + "/api/debrief/" + session_id);
    const fallbackTimer = setTimeout(fallbackFetch, 2500);
    evts.onmessage = (e) => {
      if (e.data === "[DONE]") { clearTimeout(fallbackTimer); evts.close(); _renderDebrief(body, text); return; }
      try { renderChunk(JSON.parse(e.data).text || ""); } catch(_) {}
    };
    evts.onerror = () => {
      clearTimeout(fallbackTimer);
      evts.close();
      if (!gotChunk) fallbackFetch();
    };
  } catch(_) {
    fallbackFetch();
  }
}

async function _submitAndDebrief(pre, post) {
  try {
    // 1. Submit session
    const res = await fetch(API_BASE + "/api/session/complete", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        group,
        participant_id: participantId,
        phase: "post",
        preScore: Math.round(preScore),
        postScore: Math.round(postScore),
        practiceScore: score,
        paas: {germane: paas.germane, extraneous: paas.extraneous},
        attempts: _attempts,
      }),
    });
    const {session_id} = await res.json();
    localStorage.setItem("toeic_session_id_" + participantId, session_id);
    localStorage.setItem("toeic_post_done_" + participantId, "1");
    localStorage.setItem("toeic_scores_" + participantId, JSON.stringify({pre: Math.round(preScore), post: Math.round(postScore), practice: score}));

    // 2. Stream debrief via SSE
    _streamDebrief(session_id);
  } catch(e) {
    const body = document.getElementById("debriefBody");
    if (body) body.innerHTML = `<span style="color:var(--slate)">Không kết nối được Mentor (${e.message}).</span>`;
  }
}

function _renderDebrief(el, md) {
  // Minimal markdown → HTML: bold, line breaks
  const html = md
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\n\n/g,"</p><p>")
    .replace(/\n/g,"<br>");
  el.innerHTML = `<p>${html}</p>`;
}
